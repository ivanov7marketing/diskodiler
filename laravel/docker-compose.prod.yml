services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    restart: always
    env_file:
      - .env
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    depends_on:
      db:
        condition: service_healthy
    networks:
      app_net:
      chatbot_net:
        aliases:
          - diskodiler-app

  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - diskodiler_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - app_net

volumes:
  diskodiler_pgdata:

networks:
  app_net:
    driver: bridge
  chatbot_net:
    external: true
    name: chatbot_chatbot_net
