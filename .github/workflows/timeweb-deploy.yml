name: Deploy to Timeweb

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare SSH
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.TIMEWEB_SSH_KEY }}" > ~/.ssh/timeweb_key
          chmod 600 ~/.ssh/timeweb_key
          ssh-keyscan -p "${{ secrets.TIMEWEB_PORT || 22 }}" "${{ secrets.TIMEWEB_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy Laravel app
        run: |
          rsync -az --delete \
            --exclude '.env' \
            --exclude '.env.*' \
            --exclude '.gitignore' \
            --exclude '.editorconfig' \
            --exclude '.npmrc' \
            --exclude 'README.md' \
            --exclude 'docs/' \
            --exclude 'tests/' \
            --exclude 'node_modules/' \
            --exclude 'vendor/' \
            --exclude '.npm-cache/' \
            --exclude 'bootstrap/cache/' \
            --exclude 'public/build/' \
            --exclude 'public/storage/' \
            --exclude 'storage/' \
            --exclude 'database/database.sqlite' \
            --exclude 'phpunit.xml' \
            -e "ssh -i ~/.ssh/timeweb_key -p ${{ secrets.TIMEWEB_PORT || 22 }}" \
            ./laravel/ "${{ secrets.TIMEWEB_USER }}@${{ secrets.TIMEWEB_HOST }}:${{ secrets.TIMEWEB_PATH }}/laravel/"

      - name: Clear Laravel caches
        run: |
          ssh -i ~/.ssh/timeweb_key -p "${{ secrets.TIMEWEB_PORT || 22 }}" "${{ secrets.TIMEWEB_USER }}@${{ secrets.TIMEWEB_HOST }}" \
            "docker exec laravel-app-1 php artisan optimize:clear"
