name: Deploy to Timeweb

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare SSH
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.TIMEWEB_SSH_KEY }}" > ~/.ssh/timeweb_key
          chmod 600 ~/.ssh/timeweb_key
          ssh-keyscan -p "${{ secrets.TIMEWEB_PORT || 22 }}" "${{ secrets.TIMEWEB_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy static files
        run: |
          rsync -az --delete \
            --exclude '.git/' \
            --exclude '.github/' \
            --exclude '.nojekyll' \
            --exclude 'README.md' \
            --exclude 'laravel/.env' \
            --exclude 'laravel/.env.*' \
            --exclude 'laravel/bootstrap/cache/' \
            --exclude 'laravel/public/build/' \
            --exclude 'laravel/public/storage/' \
            --exclude 'laravel/storage/' \
            -e "ssh -i ~/.ssh/timeweb_key -p ${{ secrets.TIMEWEB_PORT || 22 }}" \
            ./ "${{ secrets.TIMEWEB_USER }}@${{ secrets.TIMEWEB_HOST }}:${{ secrets.TIMEWEB_PATH }}/"

      - name: Clear Laravel caches
        run: |
          ssh -i ~/.ssh/timeweb_key -p "${{ secrets.TIMEWEB_PORT || 22 }}" "${{ secrets.TIMEWEB_USER }}@${{ secrets.TIMEWEB_HOST }}" \
            "docker exec laravel-app-1 php artisan optimize:clear"
